<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ISBN Barcode & QR Generator</title>

    <!-- Barcode CDN -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

    <!-- QR Code CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>📚 ISBN Barcode & QR Generator</h1>
            <p>Created by Prathamesh Prashant Pawar</p>
        </header>

        <!-- Main Card -->
        <div class="card">

            <input 
                type="text" 
                id="barcodeInput"
                placeholder="Enter ISBN or Number"
                value="9783161484100"
                autofocus
            >

            <select id="barcodeType">
                <option value="EAN13">EAN-13</option>
                <option value="CODE128">CODE128</option>
            </select>

            <div class="buttons">
                <button onclick="generateCode()">Generate</button>
                <button onclick="downloadBarcode()">Download</button>
                <button onclick="printCode()">Print</button>
                <button onclick="copyText()">Copy</button>
                <button onclick="clearAll()">Clear</button>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader"></div>

            <!-- Barcode -->
            <div class="output">
                <svg id="barcode"></svg>
            </div>

            <!-- QR -->
            <div id="qrcode"></div>

            <!-- Success Message -->
            <p id="message"></p>

        </div>

        <!-- History -->
        <div class="history-card">
            <h2>📜 Generation History</h2>
            <ul id="historyList"></ul>
        </div>

        <!-- Footer -->
        <footer>
            Created by Prathamesh Prashant Pawar
        </footer>

    </div>

<script src="script.js"></script>
</body>
</html>
